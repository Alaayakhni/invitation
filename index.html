<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation — Alaa & Jana</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #f5efe6;
  --gold: #c9a96e;
  --gold-light: #e8d5b0;
  --deep: #0e0906;
  --dark-brown: #2e1f0f;
  --text: #3d2b1a;
  --rose: #c4827a;
}

html, body {
  width: 100%; height: 100%;
  background: var(--deep);
  overflow: hidden;
  font-family: 'Raleway', sans-serif;
}

/* ══════════════════════════════
   SCENE — envelope front
══════════════════════════════ */
#scene {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 55%, #2a1a0a 0%, #0e0906 100%);
  transition: opacity 1.6s ease, transform 1.6s cubic-bezier(0.4,0,0.2,1);
  z-index: 10;
}

/* scene exit: fade + scale down */
#scene.hide {
  opacity: 0;
  pointer-events: none;
  transform: scale(0.94);
}

/* particles */
.particle {
  position: absolute;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0;
  animation: float-up var(--dur,8s) var(--delay,0s) infinite ease-in;
}
@keyframes float-up {
  0%   { transform: translateY(0) translateX(0) scale(0); opacity: 0; }
  10%  { opacity: 0.55; }
  90%  { opacity: 0.15; }
  100% { transform: translateY(-80vh) translateX(var(--drift,20px)) scale(0.5); opacity: 0; }
}

/* glow */
.glow {
  position: absolute;
  width: 520px; height: 320px;
  background: radial-gradient(ellipse, rgba(201,169,110,0.09) 0%, transparent 70%);
  pointer-events: none;
}

/* envelope */
#envelope-wrap {
  position: relative;
  width: min(360px, 88vw);
}

#envelope {
  width: 100%;
  aspect-ratio: 1.6/1;
  background: linear-gradient(145deg, #d4a85a 0%, #a07830 40%, #c9993f 100%);
  border-radius: 4px;
  position: relative;
  box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,169,110,0.3);
  overflow: hidden;
}
.flap {
  position: absolute; width: 100%; height: 60%; top: 0; left: 0;
  clip-path: polygon(0 0, 100% 0, 50% 58%);
  background: linear-gradient(170deg, #c9993f 0%, #8a6520 100%);
}
.env-left  { position: absolute; bottom:0; left:0; width:51%; height:55%; clip-path:polygon(0 100%,0 0,100% 100%); background:#b8892a; }
.env-right { position: absolute; bottom:0; right:0; width:51%; height:55%; clip-path:polygon(100% 100%,100% 0,0 100%); background:#9a7018; }
.env-bottom{ position: absolute; bottom:0; left:0; right:0; height:50%; background:linear-gradient(170deg,#c09030 0%,#8a6520 100%); }

#seal {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 64px; height: 64px; border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #d44040 0%, #8a1010 60%, #6a0808 100%);
  box-shadow: 0 4px 18px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center; z-index: 10;
  animation: seal-pulse 3s ease-in-out infinite;
}
@keyframes seal-pulse {
  0%,100% { box-shadow: 0 4px 18px rgba(0,0,0,0.5), 0 0 0 0 rgba(201,169,110,0); }
  50%      { box-shadow: 0 4px 18px rgba(0,0,0,0.5), 0 0 0 8px rgba(201,169,110,0.12); }
}
#seal svg { width:36px; height:36px; }

/* countdown ring */
#countdown-ring {
  margin-top: 28px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
#ring-svg { width: 58px; height: 58px; transform: rotate(-90deg); }
#ring-track { fill: none; stroke: rgba(201,169,110,0.15); stroke-width: 2; }
#ring-fill  { fill: none; stroke: var(--gold); stroke-width: 2;
  stroke-linecap: round;
  stroke-dasharray: 163; stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear;
}
#countdown-label {
  font-family: 'Cinzel', serif;
  font-size: 11px; letter-spacing: 0.28em;
  color: rgba(201,169,110,0.7);
}

/* ══════════════════════════════
   INVITATION — full page reveal
══════════════════════════════ */
#invitation {
  position: fixed; inset: 0;
  z-index: 20;
  display: flex; align-items: center; justify-content: center;
  background: #0e0906;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.4s ease;
  overflow-y: auto;
  padding: 40px 16px;
}
#invitation.visible {
  opacity: 1;
  pointer-events: all;
}

/* subtle pattern bg */
#invitation::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle at 20% 30%, rgba(201,169,110,0.04) 0%, transparent 50%),
                    radial-gradient(circle at 80% 70%, rgba(196,130,122,0.04) 0%, transparent 50%);
  pointer-events: none;
}

/* card */
#card {
  position: relative;
  width: min(540px, 96vw);
  background: var(--cream);
  border-radius: 3px;
  padding: clamp(44px,9vw,72px) clamp(32px,7vw,64px);
  text-align: center;
  box-shadow: 0 60px 140px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,169,110,0.2);
  overflow: hidden;
  opacity: 0;
  transform: translateY(70px);
  transition: opacity 1.1s ease 0.5s, transform 1.2s cubic-bezier(0.16,1,0.3,1) 0.5s;
}
#invitation.visible #card {
  opacity: 1;
  transform: translateY(0);
}

/* inner border */
#card::before {
  content: '';
  position: absolute; inset: 14px;
  border: 1px solid rgba(201,169,110,0.32);
  pointer-events: none; border-radius: 1px;
}

/* paper texture */
#card::after {
  content: '';
  position: absolute; inset: 0; pointer-events: none; opacity: 0.35;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
}

/* corners */
.corner { position: absolute; width: 48px; height: 48px; opacity: 0.5; }
.corner svg { width: 100%; height: 100%; }
.corner.tl { top:14px; left:14px; }
.corner.tr { top:14px; right:14px; transform: scaleX(-1); }
.corner.bl { bottom:14px; left:14px; transform: scaleY(-1); }
.corner.br { bottom:14px; right:14px; transform: scale(-1); }

/* staggered content */
.reveal {
  opacity: 0; transform: translateY(22px);
  transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.16,1,0.3,1);
}
#invitation.visible .reveal { opacity: 1; transform: translateY(0); }

.r1 { transition-delay: 1.1s; }
.r2 { transition-delay: 1.5s; }
.r3 { transition-delay: 1.8s; }
.r4 { transition-delay: 2.1s; }
.r5 { transition-delay: 2.4s; }
.r6 { transition-delay: 2.7s; }

.pre-title {
  font-family: 'Cinzel', serif;
  font-size: 9.5px; letter-spacing: 0.38em;
  color: var(--gold);
  margin-bottom: 0;
}

.divider {
  display: flex; align-items: center; gap: 14px;
  margin: 20px 0;
}
.divider::before, .divider::after {
  content:''; flex:1; height:1px;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,0.5));
}
.divider::after { background: linear-gradient(90deg, rgba(201,169,110,0.5), transparent); }
.dicon { color: var(--gold); font-size: 13px; }

.names {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300; font-style: italic;
  font-size: clamp(38px, 10vw, 56px);
  color: var(--dark-brown);
  line-height: 1.08; letter-spacing: 0.02em;
}
.ampersand {
  display: block;
  font-size: clamp(28px,7vw,40px);
  color: var(--gold);
  font-style: normal;
  margin: 4px 0;
}

.phrase {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(15px,3.5vw,18px);
  font-weight: 300; font-style: italic;
  color: #5a3d28;
  letter-spacing: 0.04em; line-height: 1.8;
}

.details {
  display: flex; justify-content: center; gap: 0;
  margin-top: 4px;
}
.detail-block {
  padding: 0 clamp(16px,4vw,28px);
  position: relative;
}
.detail-block + .detail-block::before {
  content:'';
  position: absolute; left:0; top:18%; height:64%;
  width:1px; background: rgba(201,169,110,0.4);
}
.detail-label {
  font-family: 'Cinzel', serif;
  font-size: 8px; letter-spacing: 0.3em;
  color: var(--gold); margin-bottom: 7px;
}
.detail-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(15px,3.5vw,18px); font-weight: 400;
  color: var(--dark-brown); line-height: 1.35;
}

/* bottom monogram */
.mono {
  margin-top: 6px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 22px;
  color: rgba(201,169,110,0.55);
  letter-spacing: 0.1em;
}

/* petals */
.petal {
  position: fixed; pointer-events: none; z-index: 30;
  opacity: 0;
  animation: fall-petal var(--pd,8s) var(--pdelay,0s) linear forwards;
}
@keyframes fall-petal {
  0%   { opacity:0; transform: translateY(-30px) rotate(0deg) scale(0.8); }
  8%   { opacity:0.6; }
  90%  { opacity:0.15; }
  100% { opacity:0; transform: translateY(110vh) rotate(var(--prot,360deg)) scale(1); }
}
</style>
</head>
<body>

<!-- ── SCENE ── -->
<div id="scene">
  <div class="glow"></div>
  <div id="particles"></div>

  <div id="envelope-wrap">
    <div id="envelope">
      <div class="flap"></div>
      <div class="env-left"></div>
      <div class="env-right"></div>
      <div class="env-bottom"></div>
      <div id="seal">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="18" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1"/>
          <text x="24" y="30" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="rgba(255,255,255,0.9)" font-style="italic">A&amp;J</text>
        </svg>
      </div>
    </div>

    <!-- countdown -->
    <div id="countdown-ring">
      <svg id="ring-svg" viewBox="0 0 52 52">
        <circle id="ring-track" cx="26" cy="26" r="22"/>
        <circle id="ring-fill"  cx="26" cy="26" r="22" stroke-dasharray="138.2" stroke-dashoffset="0"/>
      </svg>
      <div id="countdown-label">Opening in 5…</div>
    </div>
  </div>
</div>

<!-- ── INVITATION PAGE ── -->
<div id="invitation">
  <div id="card">
    <!-- corners -->
    <div class="corner tl"><svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 5 L5 24 M5 5 L24 5" stroke="#c9a96e" stroke-width="1"/><path d="M5 16 C12 16 16 12 16 5" stroke="#c9a96e" stroke-width="0.8"/><circle cx="5" cy="5" r="2" fill="#c9a96e"/></svg></div>
    <div class="corner tr"><svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 5 L5 24 M5 5 L24 5" stroke="#c9a96e" stroke-width="1"/><path d="M5 16 C12 16 16 12 16 5" stroke="#c9a96e" stroke-width="0.8"/><circle cx="5" cy="5" r="2" fill="#c9a96e"/></svg></div>
    <div class="corner bl"><svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 5 L5 24 M5 5 L24 5" stroke="#c9a96e" stroke-width="1"/><path d="M5 16 C12 16 16 12 16 5" stroke="#c9a96e" stroke-width="0.8"/><circle cx="5" cy="5" r="2" fill="#c9a96e"/></svg></div>
    <div class="corner br"><svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 5 L5 24 M5 5 L24 5" stroke="#c9a96e" stroke-width="1"/><path d="M5 16 C12 16 16 12 16 5" stroke="#c9a96e" stroke-width="0.8"/><circle cx="5" cy="5" r="2" fill="#c9a96e"/></svg></div>

    <p class="pre-title reveal r1">Together with their families</p>

    <div class="divider reveal r2"><span class="dicon">✦</span></div>

    <div class="names reveal r3">
      Alaa YAKHNI
      <span class="ampersand">&amp;</span>
      Jana ARRAJ
    </div>

    <div class="divider reveal r4"><span class="dicon">✦</span></div>

    <p class="phrase reveal r4">
      joyfully invite you to celebrate<br>
      their engagement & the beginning of their forever
    </p>

    <div class="divider reveal r5"><span class="dicon">✦</span></div>

    <div class="details reveal r5">
      <div class="detail-block">
        <p class="detail-label">Date</p>
        <p class="detail-value">August 6<br>2026</p>
      </div>
      <div class="detail-block">
        <p class="detail-label">Time</p>
        <p class="detail-value">6:00<br>PM</p>
      </div>
      <div class="detail-block">
        <p class="detail-label">Venue</p>
        <p class="detail-value">Acropolis Venue<br>Rachiine , Zgharta</p>
      </div>
    </div>

    <p class="mono reveal r6">A ✦ J</p>
  </div>
</div>

<div id="petals"></div>

<script>
// ── particles
const pCont = document.getElementById('particles');
for (let i = 0; i < 20; i++) {
  const el = document.createElement('div');
  el.className = 'particle';
  const s = 1 + Math.random() * 3;
  el.style.cssText = `left:${8+Math.random()*84}%;bottom:${Math.random()*25}%;
    width:${s}px;height:${s}px;
    --dur:${6+Math.random()*8}s;--delay:${Math.random()*8}s;
    --drift:${(Math.random()-.5)*90}px;`;
  pCont.appendChild(el);
}

// ── countdown ring
const circumference = 2 * Math.PI * 22; // ≈ 138.2
const ringFill = document.getElementById('ring-fill');
const label    = document.getElementById('countdown-label');
ringFill.style.strokeDasharray  = circumference;
ringFill.style.strokeDashoffset = 0;

const TOTAL = 5000; // 5 seconds
const start = performance.now();
let opened = false;

function tick(now) {
  const elapsed = now - start;
  const progress = Math.min(elapsed / TOTAL, 1);
  const offset = circumference * progress;
  ringFill.style.strokeDashoffset = offset;

  const remaining = Math.ceil((TOTAL - elapsed) / 1000);
  label.textContent = remaining > 0 ? `Opening in ${remaining}…` : 'Opening…';

  if (!opened && progress >= 1) {
    opened = true;
    openInvitation();
    return;
  }
  if (!opened) requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// ── open
function openInvitation() {
  const scene = document.getElementById('scene');
  const inv   = document.getElementById('invitation');

  // fade + shrink scene
  scene.classList.add('hide');

  // after scene fades, show invitation
  setTimeout(() => {
    inv.classList.add('visible');
    spawnPetals();
  }, 900);
}

// ── petals
const symbols = ['❀','✿','❁','✾','❋'];
function spawnPetals() {
  const cont = document.getElementById('petals');
  for (let i = 0; i < 24; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'petal';
      p.textContent = symbols[Math.floor(Math.random()*symbols.length)];
      p.style.cssText = `
        left:${Math.random()*100}vw; top:-24px;
        font-size:${10+Math.random()*16}px;
        color:${Math.random()>.5?'#c9a96e':'#c4827a'};
        --pd:${6+Math.random()*9}s;
        --pdelay:${Math.random()*5}s;
        --prot:${200+Math.random()*300}deg;
      `;
      cont.appendChild(p);
      setTimeout(() => p.remove(), 16000);
    }, i * 180);
  }
}
</script>
</body>
</html>
